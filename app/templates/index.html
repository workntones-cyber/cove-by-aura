<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AURA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="/static/aura.ico">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav>
  <span class="nav-logo">AURA</span>
  <div class="nav-links">
    <a href="/" class="nav-link {% if active_page == 'index' %}active{% endif %}">🎙️ 録音</a>
    <a href="/settings" class="nav-link {% if active_page == 'settings' %}active{% endif %}">⚙️ 設定</a>
    <button class="nav-shutdown-btn" onclick="shutdownApp()" title="AURAを終了する">⏻ 終了</button>
  </div>
</nav>

<main>

  <!-- APIキー未設定バナー -->
  <div class="api-warning-banner" id="apiWarningBanner" style="display:none;">
    <div class="api-warning-icon">⚠️</div>
    <div class="api-warning-text">
      <strong>APIキーが設定されていません</strong><br>
      録音はできますが、文字起こし・要約には Groq APIキーが必要です。
      <a href="/settings" class="api-warning-link">設定画面で入力する →</a>
    </div>
  </div>

  <!-- BlackHole未インストール警告（Mac・システム音声モード時のみ） -->
  <div class="api-warning-banner" id="blackholeBanner" style="display:none;">
    <div class="api-warning-icon">⚠️</div>
    <div class="api-warning-text">
      <strong>BlackHole がインストールされていません</strong><br>
      Mac でオンライン会議の音声を録音するには BlackHole が必要です。
      <a href="/settings" class="api-warning-link">設定画面でインストール手順を見る →</a>
    </div>
  </div>

  <!-- Ollama未起動警告（ビジネス用モード時のみ） -->
  <div class="api-warning-banner" id="ollamaBanner" style="display:none;">
    <div class="api-warning-icon">⚠️</div>
    <div class="api-warning-text">
      <strong>Ollama が起動していません</strong><br>
      ビジネス用モードの要約にはOllamaが必要です。
      <a href="https://ollama.com/download" target="_blank" class="api-warning-link">Ollamaをインストールする →</a>
    </div>
  </div>

  <!-- タイトル・メモ入力 -->
  <div class="meta-section">
    <label>タイトル</label>
    <input id="titleInput" class="meta-input" type="text" placeholder="例：週次定例会議" maxlength="100" />
    <div class="meta-divider"></div>
    <label>概要メモ</label>
    <textarea id="memoInput" class="meta-input" rows="2" placeholder="例：Q1の売上について議論"></textarea>
    <div class="meta-divider"></div>
    <!-- 現在の設定状態 -->
    <div class="current-settings-bar" id="currentSettingsBar">
      <a href="/settings" class="settings-badge-link" title="設定">⚙️</a>
      <div class="settings-badges-row" id="settingsBadgesRow">
        <!-- JS で動的生成 -->
      </div>
    </div>
  </div>

  <!-- 録音セクション -->
  <div class="record-section">
    <div class="visualizer" id="visualizer"></div>
    <button class="record-btn" id="recordBtn" onclick="toggleRecording()">🎙️</button>
    <div class="record-label" id="recordLabel">タップして録音開始</div>
    <div class="record-timer" id="recordTimer">00:00</div>
  </div>

  <!-- 処理状態 -->
  <div class="process-section" id="processSection">
    <div class="process-step" id="step1">
      <div class="step-icon">①</div>
      <span>文字起こし中...</span>
    </div>
    <div class="process-step" id="step2">
      <div class="step-icon">②</div>
      <span>AI要約中...</span>
    </div>
    <div class="error-detail" id="transcribeError"></div>

  </div>

  <!-- 結果表示 -->
  <div class="result-section" id="resultSection">
    <div class="result-card">
      <div class="result-card-header">
        <div class="result-card-title">📝 文字起こし</div>
        <button class="export-btn" onclick="copyText('transcriptBody')">コピー</button>
      </div>
      <div class="result-card-body" id="transcriptBody"></div>
    </div>
    <div class="result-card">
      <div class="result-card-header">
        <div class="result-card-title">✨ AI要約</div>
        <button class="export-btn" onclick="exportText()">保存</button>
      </div>
      <div class="result-card-body" id="summaryBody"></div>
    </div>
  </div>

  <!-- 過去データ一覧 -->
  <div class="history-section">
    <div class="section-title">過去の録音</div>
    <div id="historyList"></div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script src="/static/js/recorder.js"></script>
</body>
</html>
