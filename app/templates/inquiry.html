<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>COVE - 照会室</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="/static/cove.ico">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    /* ─── レイアウト基盤 ─── */
    .page-layout {
      display: block;
      min-height: 100vh;
      margin-right: 260px;
    }
    .input-fixed {
      position: fixed;
      top: 56px; left: 0; right: 260px;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,.2);
    }
    .main-col {
      padding: 0 28px 80px 28px;
    }
    /* ─── 右サイドパネル（完全固定） ─── */
    .context-panel {
      width: 260px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      position: fixed;
      top: 56px;
      right: 0;
      height: calc(100vh - 56px); /* JS で上書きされる */
      overflow-y: auto;
      overflow-x: hidden;
      padding: 20px 16px;
      z-index: 99;
      box-sizing: border-box;
      transition: height .15s ease;
    }
    .ctx-title {
      font-size: 12px; font-weight: 600; color: var(--text);
      margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
    }
    .ctx-section { margin-bottom: 16px; }
    .ctx-section-head {
      font-size: 10px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .05em;
      margin-bottom: 6px; padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .ctx-item {
      display: flex; align-items: flex-start; gap: 7px;
      padding: 5px 4px; border-radius: 6px;
      transition: background .15s; cursor: pointer;
    }
    .ctx-item:hover { background: var(--bg); }
    .ctx-item-label {
      flex: 1; font-size: 11px; color: var(--text); line-height: 1.4;
      word-break: break-all;
    }
    .ctx-item-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .ctx-toggle {
      flex-shrink: 0; width: 32px; height: 18px;
      background: var(--border); border-radius: 9px;
      position: relative; cursor: pointer; transition: background .2s;
      border: none; padding: 0;
    }
    .ctx-toggle.on  { background: #7C6AF7; }
    .ctx-toggle::after {
      content: ''; position: absolute; width: 12px; height: 12px;
      background: #fff; border-radius: 50%; top: 3px; left: 3px;
      transition: left .2s;
    }
    .ctx-toggle.on::after { left: 17px; }
    .ctx-empty { font-size: 11px; color: var(--muted); padding: 4px; }

    /* ─── 入力エリア ─── */
    .council-input-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 18px 22px 16px; margin-bottom: 28px;
    }
    .council-input-row { display: flex; gap: 16px; align-items: flex-start; }
    .council-input-main { flex: 1; }
    .council-input-side { min-width: 170px; display: flex; flex-direction: column; gap: 8px; }
    .c-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; display: block; }
    .c-select {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 10px; font-size: 13px;
      color: var(--text); cursor: pointer; font-family: inherit;
    }
    .c-textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; font-size: 13px; color: var(--text);
      resize: none; height: 84px; outline: none; font-family: inherit; line-height: 1.6;
    }
    .c-textarea:focus { border-color: #7C6AF7; }
    .c-btn {
      width: 100%; background: #7C6AF7; color: #fff; border: none;
      border-radius: 8px; padding: 10px 0; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: opacity .2s; margin-top: auto;
    }
    .c-btn:hover { opacity: .88; } .c-btn:disabled { opacity: .4; cursor: default; }
    /* ─── 複数カテゴリ選択ドロップダウン ─── */
    .multi-cat-wrap { position:relative; width:100%; }
    .multi-cat-btn {
      width:100%; background:var(--bg); border:1px solid var(--border);
      border-radius:8px; padding:7px 10px; font-size:13px; color:var(--text);
      cursor:pointer; font-family:inherit; text-align:left;
      display:flex; align-items:center; justify-content:space-between;
    }
    .multi-cat-btn:hover { border-color:#7C6AF7; }
    .multi-cat-dropdown {
      display:none; position:absolute; top:calc(100% + 4px); left:0; right:0;
      background:#1a1a2e; border:1px solid var(--border); border-radius:8px;
      z-index:9999; max-height:220px; overflow-y:auto;
      box-shadow:0 8px 32px rgba(0,0,0,.6);
      isolation:isolate;
    }
    .multi-cat-dropdown.open { display:block; }
    .multi-cat-item {
      display:flex; align-items:center; gap:8px; padding:8px 12px;
      cursor:pointer; font-size:13px; color:var(--text); transition:background .12s;
    }
    .multi-cat-item:hover { background:var(--bg); }
    .multi-cat-item input[type=checkbox] { accent-color:#7C6AF7; width:15px; height:15px; flex-shrink:0; }
    .multi-cat-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

    /* ─── ペルソナエリア ─── */
    .persona-stage {
      width: 100%; margin-bottom: 28px;
      display: flex; flex-wrap: wrap; gap: 12px;
      align-items: flex-start;
    }

    /* ペルソナカード：縦積み・枠を円形に */
    .persona-card {
      background: var(--surface); border: 2px solid var(--border);
      border-radius: 10px;
      padding: 8px 6px 6px;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      text-align: center;
      transition: border-color .4s, opacity .3s, transform .2s;
      width: 170px !important; /* JS の CARD_W を上書き */
    }
    .persona-card:hover { transform: translateY(-2px); }
    .persona-card.absent   { opacity: .38; filter: grayscale(.8); }
    .persona-card.thinking { border-color: #FAC775; box-shadow: 0 0 0 3px #FAC77540; }
    .persona-card.done     { border-color: #1D9E75; box-shadow: 0 0 0 3px #1D9E7530; }

    /* 円形アバター */
    .p-avatar {
      width: 72px; height: 72px; border-radius: 50%; flex-shrink: 0;
      position: relative; overflow: hidden;
    }
    .p-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .p-avatar svg { width: 100%; height: 100%; display: block; }

    @keyframes sway { 0%,100%{transform:rotate(-4deg)} 50%{transform:rotate(4deg)} }
    @keyframes db   { 0%,80%,100%{transform:translateY(0);opacity:.35} 40%{transform:translateY(-4px);opacity:1} }
    .persona-card.thinking .p-avatar { animation: sway 1.8s ease-in-out infinite; }

    .p-info { display: flex; flex-direction: column; gap: 2px; width: 100%; }
    .p-name { font-size: 11px; font-weight: 600; color: var(--text); }
    .p-role { font-size: 9px; color: var(--muted); line-height: 1.3; }
    .p-status { font-size: 9px; display: flex; align-items: center; justify-content: center; gap: 3px; }
    .p-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
    .persona-card.thinking .p-dot { background: #FAC775; }
    .persona-card.done     .p-dot { background: #1D9E75; }

    .think-bubble {
      display: none; position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      padding: 1px 5px; font-size: 9px; color: var(--muted); white-space: nowrap; z-index: 20;
    }
    .persona-card.thinking .think-bubble { display: block; }
    .dot { display:inline-block;width:3px;height:3px;border-radius:50%;background:currentColor;margin:0 1.5px;animation:db 1.1s infinite; }
    .dot:nth-child(2){animation-delay:.18s} .dot:nth-child(3){animation-delay:.36s}

    /* 入室/退室ボタン：カード下部 */
    .presence-btn {
      width: 80%; padding: 2px 0; border-radius: 8px;
      font-size: 8px; font-weight: 500; cursor: pointer;
      font-family: inherit; transition: all .15s; border: 1px solid;
    }
    .presence-btn.in  { background: transparent; border-color: var(--border); color: var(--muted); }
    .presence-btn.in:hover { border-color: #E24B4A; color: #E24B4A; background: #FCEBEB; }
    .presence-btn.out { background: #E1F5EE; border-color: #1D9E75; color: #0F6E56; font-weight: 600; }
    .presence-btn.out:hover { background: #9FE1CB; }

    /* アコーディオン（参照データパネル） */
    .ctx-accordion { margin-bottom: 10px; }
    .ctx-acc-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 4px; cursor: pointer; border-radius: 6px;
      transition: background .15s; user-select: none;
    }
    .ctx-acc-head:hover { background: var(--bg); }
    .ctx-acc-label {
      font-size: 10px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .05em;
    }
    .ctx-acc-arrow {
      font-size: 10px; color: var(--muted);
      transition: transform .2s;
    }
    .ctx-acc-arrow.open { transform: rotate(180deg); }
    .ctx-acc-body {
      overflow: hidden; max-height: 0;
      transition: max-height .25s ease;
    }
    .ctx-acc-body.open { max-height: 9999px; }

    /* ─── RPG回答パネル ─── */
    /* ─── RPG回答パネル ─── */
    .rpg-panel {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 34vh; min-height: 220px; max-height: 60vh;
      background: #1a1a2e; border-top: 2px solid var(--border);
      box-shadow: 0 -8px 32px rgba(0,0,0,.6);
      z-index: 200; display: none; flex-direction: column;
    }
    .rpg-panel.visible { display: flex; }

    .rpg-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .rpg-header-left { display: flex; align-items: center; gap: 10px; }
    .rpg-persona-label { font-size: 13px; font-weight: 600; color: var(--text); }
    .rpg-persona-role  { font-size: 11px; color: var(--muted); }
    .rpg-nav { display: flex; align-items: center; gap: 8px; }
    .rpg-nav-btn {
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 12px; font-size: 13px; cursor: pointer; color: var(--text);
      transition: background .15s;
    }
    .rpg-nav-btn:hover:not(:disabled) { background: var(--border); }
    .rpg-nav-btn:disabled { opacity: .3; cursor: default; }
    .rpg-counter { font-size: 12px; color: var(--muted); min-width: 44px; text-align: center; }
    .rpg-end-btn {
      background: #7C6AF7; color: #fff; border: none;
      border-radius: 6px; padding: 5px 12px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: opacity .2s;
    }
    .rpg-end-btn:hover { opacity: .85; }
    .rpg-close-btn {
      background: transparent; border: none; cursor: pointer;
      font-size: 17px; color: var(--muted); padding: 2px 6px;
    }
    .rpg-close-btn:hover { color: var(--text); }

    .rpg-body { display: flex; flex: 1; overflow: hidden; padding: 14px 20px; gap: 20px; align-items: stretch; }

    .rpg-char { display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0; width: 100px; }
    .rpg-char-face {
      width: 90px; height: 90px; border-radius: 50%; overflow: hidden;
      border: 2px solid var(--border); flex-shrink: 0; transition: border-color .3s;
    }
    .rpg-char-face svg { width: 100%; height: 100%; }
    .rpg-char-face.thinking-face { border-color: #FAC775; }
    .rpg-char-face.done-face     { border-color: #1D9E75; }
    .rpg-adopt-btn {
      width: 100%; padding: 5px 0; background: transparent;
      border: 1px solid #1D9E75; color: #1D9E75; border-radius: 8px;
      font-size: 10px; cursor: pointer; font-family: inherit; transition: background .15s;
    }
    .rpg-adopt-btn:hover { background: #E1F5EE; }
    .rpg-adopt-btn.adopted { border-color: #EF9F27; color: #854F0B; background: #FAEEDA; cursor: default; }

    .rpg-text-area {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 18px; overflow-y: auto; position: relative;
    }
    .rpg-thinking-indicator { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; }
    .rpg-answer-text { font-size: 13px; color: var(--text); line-height: 1.8; white-space: pre-wrap; }

    @keyframes blink-cursor { 0%,100%{opacity:1} 50%{opacity:0} }
    .typing-cursor {
      display: inline-block; width: 2px; height: 1em;
      background: var(--text); vertical-align: text-bottom;
      animation: blink-cursor .7s infinite; margin-left: 1px;
    }

    /* ─── 下段 ─── */
    .council-bottom { display: flex; gap: 24px; align-items: stretch; margin-top: 4px; }
    .decision-section {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px 20px;
    }
    .history-section {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px 20px; max-height: 520px; overflow-y: auto;
    }
    .section-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
    .adopted-list  { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .adopted-tag   { background: #FAEEDA; color: #854F0B; border: 1px solid #EF9F27; border-radius: 6px; padding: 3px 9px; font-size: 11px; }
    .decision-textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 12px; font-size: 13px; color: var(--text);
      resize: none; height: 72px; outline: none; font-family: inherit; line-height: 1.6;
    }
    .decision-textarea:focus { border-color: #7C6AF7; }
    .save-decision-btn {
      float: right; margin-top: 8px; background: transparent; border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 16px; font-size: 12px; cursor: pointer;
      color: var(--text); font-family: inherit; transition: background .2s;
    }
    .save-decision-btn:hover { background: var(--bg); }
    .history-item { display: flex; flex-direction: column; gap: 4px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 12px; cursor: pointer; }
    .history-item:last-child { border-bottom: none; }
    .history-item:hover { background: var(--bg); border-radius: 6px; padding-left: 6px; }
    .history-date { color: var(--muted); font-size: 10px; white-space: nowrap; }
    .history-date .history-q { font-weight: 600; color: var(--text); font-size: 12px; margin-left: 6px; white-space: normal; }
    .history-meta { font-size: 10px; color: var(--muted); }
    .history-decision { font-size: 10px; color: var(--muted); margin-top: 2px; font-style: italic; }
    .history-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 20px 0; }
    .history-detail { display:none; margin-top:8px; padding:8px; background:var(--bg); border-radius:8px; }
    .history-item.open .history-detail { display:block; }
    /* ★ 評価 */
    .star-rating { display:inline-flex; gap:2px; }
    .star { font-size:16px; cursor:pointer; color:var(--border); transition:color .15s; }
    .star.on { color:#EF9F27; }
    .star:hover { color:#FAC775; }
  </style>
</head>
<body>

<!-- エラーモーダル -->
<div id="errorModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
     z-index:99999;align-items:center;justify-content:center;backdrop-filter:blur(6px);">
  <div style="background:#1e1e2e;border:1px solid #E24B4A;border-radius:16px;padding:32px 28px;
              width:90%;max-width:420px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.8);">
    <div style="font-size:48px;margin-bottom:16px;" id="errorModalIcon">⚠️</div>
    <div style="font-size:16px;font-weight:700;color:#E24B4A;margin-bottom:12px;" id="errorModalTitle">
      エラーが発生しました
    </div>
    <div style="font-size:13px;color:#ccc;line-height:1.8;margin-bottom:24px;" id="errorModalMsg"></div>
    <button id="errorModalBtn" onclick="closeErrorModal()"
      style="padding:10px 28px;border-radius:8px;border:none;background:#7C6AF7;
             color:#fff;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;width:100%;">
      相談をやり直す
    </button>
  </div>
</div>

<nav>
  <span class="nav-logo">
    COVE
  </span>
  <div class="nav-links">
    <a href="/"        class="nav-link {% if active_page=='index'   %}active{% endif %}">🎙️ 録音</a>
    <a href="/vault"   class="nav-link {% if active_page=='vault'   %}active{% endif %}">🗄️ 保管庫</a>
    <a href="/inquiry"  class="nav-link {% if active_page=='inquiry' %}active{% endif %}">🔍 照会室</a>
    <a href="/council" class="nav-link {% if active_page=='council' %}active{% endif %}">💬 相談室</a>
    <a href="/settings"class="nav-link {% if active_page=='settings'%}active{% endif %}">⚙️ 設定</a>
    <a href="/help" target="_blank" class="nav-link" title="取扱説明書" style="font-size:18px;padding:4px 8px;">❓</a>
    <a href="/settings" id="navAiBadge" class="nav-ai-badge local" title="AI設定を変更"><span class="nav-ai-name">Ollama</span><span class="nav-ai-type">ローカルAI</span></a>
    <button class="nav-shutdown-btn" onclick="shutdownApp()" title="終了">⏻ 終了</button>
  </div>
</nav>

<div class="page-layout">
  <div class="main-col">

    <!-- ① 入力エリア（ナビ直下固定） -->
    <div class="input-fixed" id="inputFixed">
    <!-- 基本情報未登録バナー -->
    <div id="profileBanner" style="display:none;background:#FAEEDA;border:1px solid #EF9F27;border-radius:10px;padding:8px 14px;margin-bottom:8px;font-size:12px;color:#854F0B;align-items:center;justify-content:space-between;">
      <span>⚠️ <strong>利用者情報が未登録です。</strong>登録すると相談の精度が上がります。</span>
      <a href="/vault" style="color:#7C6AF7;font-weight:600;text-decoration:none;white-space:nowrap;margin-left:12px;">保管庫で登録する →</a>
    </div>
    <div class="council-input-section" style="margin-bottom:0;">
      <div class="council-input-row">
        <div class="council-input-main">
          <label class="c-label">照会内容</label>
          <textarea class="c-textarea" id="councilQuestion"
            placeholder="例：先月の会議で決まったことは？　重要な数字は？"></textarea>
        </div>
        <div class="council-input-side">
          <div>
            <label class="c-label">カテゴリ</label>
            <div class="multi-cat-wrap" id="multiCatWrap">
              <button type="button" class="multi-cat-btn" onclick="toggleCatDropdown()">
                <span id="multiCatLabel">カテゴリを選択</span>
                <span>▾</span>
              </button>
              <div class="multi-cat-dropdown" id="multiCatDropdown"></div>
            </div>
          </div>
          <button class="c-btn" id="consultBtn" onclick="startInquiry()">🔍 照会する</button>
        </div>
      </div>
    </div>
    </div><!-- /input-fixed -->

    <!-- ② 会話ログエリア -->
    <div id="conversationLog" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 20px;margin-bottom:28px;max-height:calc(100vh - 300px);overflow-y:auto;">
      <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:12px;">📋 照会ログ</div>
      <div id="logList"></div>
    </div>

  </div><!-- /main-col -->

</div><!-- /page-layout -->

<!-- 右サイドパネル：参照データ（fixed配置・page-layoutの外） -->
<div class="context-panel" id="contextPanel">
  <div class="ctx-title">🗂 アーカイバーが参照するデータ</div>
  <div id="ctxContent"><div class="ctx-empty">カテゴリを選択してください</div></div>
</div>

<!-- RPG回答パネル -->
<div class="rpg-panel" id="rpgPanel">
  <div class="rpg-header">
    <div class="rpg-header-left">
      <div>
        <div class="rpg-persona-label" id="rpgName">—</div>
        <div class="rpg-persona-role"  id="rpgRole">—</div>
      </div>
    </div>
    <div class="rpg-nav">
      <button class="rpg-close-btn" onclick="closeRpgPanel()" title="閉じる">✕</button>
    </div>
  </div>
  <div class="rpg-body">
    <div class="rpg-char">
      <div class="rpg-char-face" id="rpgFace"></div>
      <div id="rpgElapsed" style="font-size:11px;color:var(--muted);margin-top:4px;text-align:center;min-height:16px;"></div>
    </div>
    <div class="rpg-text-area" id="rpgTextArea">
      <div class="rpg-thinking-indicator" id="rpgThinking" style="display:none;">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        <span style="margin-left:5px;">考えています…</span>
      </div>
      <div class="rpg-answer-text" id="rpgAnswerText"></div>

  return state === 'think' ? 'think' : 'wait';
}

  const key = PERSONA_IMG_MAP[name];
  if(!key) return null;
  const src = `/static/img/personas/${key}_${imgState}.png`;
  return `<img src="${src}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"
    onerror="this.parentElement.innerHTML=buildAvatarFallback('${name}','${imgState}')" >`;
}

const thinkTimers = {};
const thinkPhases = {};

function nameToKey(name) {
  const p = PERSONA_DEFS.find(x => x.name === name);
  return p ? p.key : name;
}

function startThinkAnimation(name) {
  const key      = nameToKey(name);
  const avatarEl = document.querySelector(`#pcard-${key} .p-avatar`);
  if(avatarEl) avatarEl.innerHTML = buildAvatarHtml(name, 'think');
  if(rpgActiveList[rpgIndex] === name) {
    const rpgFaceEl = document.getElementById('rpgFace');
    if(rpgFaceEl) rpgFaceEl.innerHTML = buildAvatarHtml(name, 'think');
  }
}

function stopThinkAnimation(name) {
  const key      = nameToKey(name);
  const avatarEl = document.querySelector(`#pcard-${key} .p-avatar`);
  if(avatarEl) avatarEl.innerHTML = buildAvatarHtml(name, 'wait');
}

  if(newState === 'think') startThinkAnimation(name);

function drawSilhouette() {
  return `<svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
    <circle cx="28" cy="28" r="28" fill="#9CA3AF"/>
    <circle cx="28" cy="20" r="10" fill="#4B5563"/>

  </svg>`;
}

// カスタムアイコンキャッシュ（name -> url or null）
const customIconCache = {};

async function loadCustomIcon(name) {
  if((name + ':wait') in customIconCache) return;
  try {
    const res  = await fetch(`/api/personas/${encodeURIComponent(name)}/icon`);
    const data = await res.json();
    customIconCache[name + ':wait']  = data.wait  || null;
    customIconCache[name + ':think'] = data.think || null;
  } catch(e) {
    customIconCache[name + ':wait']  = null;
    customIconCache[name + ':think'] = null;
  }
}

// アバターHTMLを生成（カード・RPGパネル共通）
function buildAvatarHtml(name, state) {
  const imgState = getPersonaImgState(state); // 'wait' or 'think'

  // ① カスタムアイコン
  const customWait  = customIconCache[name + ':wait'];
  const customThink = customIconCache[name + ':think'];
  if(customWait || customThink) {
    const url = (imgState === 'think' && customThink) ? customThink : (customWait || customThink);
    return `<img src="${url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  }

  // ② デフォルトPNG（PERSONA_IMG_MAPに登録済みペルソナ）
  // think → wait の順で試みる。imgタグのonerrorは使わずJSで制御
  const key = PERSONA_IMG_MAP[name];
  if(key) {
    const src = imgState === 'think'
      ? `/static/img/personas/${key}_think.png`
      : `/static/img/personas/${key}_wait.png`;
    // 画像存在確認はキャッシュ済み or 即時返す（ブラウザが404をキャッシュするため2回目以降は速い）
    return `<img src="${src}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"
      onerror="handleAvatarError(this,'${name}','${imgState}')">`;
  }

  // ③ シルエット
  return drawSilhouette();
}

// onerror ハンドラ（グローバル関数として定義することでonerror属性から確実に呼べる）

  const key = PERSONA_IMG_MAP[name];

    img.onerror = function() { handleAvatarError(this, name, 'wait'); };
    img.src = `/static/img/personas/${key}_wait.png`;
    return;

  // wait も失敗 or PERSONA_IMG_MAPにない → SVG描画
  if(key) {
    const inner = drawPersonaFaceSVGInner(name, 'wait');
    if(inner && !inner.includes('fill="#ccc"')) {
      img.outerHTML = `<svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
      return;
    }
  }
  img.outerHTML = drawSilhouette();
}

  return drawPersonaFaceSVGFallback(name, imgState);
}

}

// 経過時間管理

function startElapsedTimer(name) {
  personaStartTimes[name] = new Date();
}

function stopElapsedTimer(name) {
  if(personaStartTimes[name]) {
    const secs = Math.round((new Date() - personaStartTimes[name]) / 1000);
    personaElapsed[name] = secs;
  }
}

function getElapsedText(name, state) {
  if(state === 'done' && personaElapsed[name] !== undefined) {
    return `${personaElapsed[name]}秒`;
  }
  if(state === 'think' && personaStartTimes[name]) {
    const secs = Math.round((new Date() - personaStartTimes[name]) / 1000);
    return `${secs}秒…`;
  }
  return '';
}

function updateElapsedDisplay() {
  const name  = rpgActiveList[rpgIndex];
  const state = personaStates[name] || 'wait';
  const el    = document.getElementById('rpgElapsed');

function renderPersonaStage() {
  const stage = document.getElementById('personaStage');
  stage.innerHTML = ''; // flex子要素として直接追加

  PERSONA_DEFS.forEach((p, i) => {
    const present = personaPresent[p.name] !== false;
    const state   = personaStates[p.name] || 'wait';
    const st      = present ? state : 'absent';

    const statusTxt    = !present ? '退出中' : st==='wait'?'待機中':st==='think'?'考え中…':'回答完了';
    const presenceClass = present ? 'in' : 'out';
    const presenceTxt   = present ? '退出する' : '入室する';
    const clickable     = st === 'done' && present;

    if(st === 'think') startThinkAnimation(p.name);
    else               stopThinkAnimation(p.name);

    const div = document.createElement('div');
    div.id = `pcard-${p.key}`;
    div.className = `persona-card ${st}`;

let contextEnabled = {}; // key -> bool

async function loadContextData() {
  const catIds = getSelectedCategoryIds();
  const content = document.getElementById('ctxContent');
  content.innerHTML = '<div class="ctx-empty">読み込み中…</div>';

  try {
    const catResults = await Promise.all(catIds.map(async catId => {
      const [recs, memos, files] = await Promise.all([
        fetch(`/api/recordings?category_id=${catId}`).then(r=>r.json()).catch(()=>[]),
        fetch(`/api/vault/memos?category_id=${catId}`).then(r=>r.json()).catch(()=>[]),
        fetch(`/api/vault/files?category_id=${catId}`).then(r=>r.json()).catch(()=>[]),
      ]);
      return { catId, recs, memos, files };
    }));

    const cats = await fetch('/api/categories').then(r=>r.json()).catch(()=>[]);
    const catNameMap = Object.fromEntries(cats.map(c=>[c.id, c.name]));
    const multiCat = catIds.length > 1;
    let html = '';

    catResults.forEach(({ catId, recs, memos, files }) => {
      const catName = catNameMap[catId] || `カテゴリ${catId}`;
      const sections = [
        { icon:'🎙', label:'録音',    items: recs.filter(r=>r.cleaned_transcript||r.ai_summary).map(r=>({ key:`rec_${r.id}`,  title:r.title||'無題', sub:r.created_at?r.created_at.slice(0,10):'', preview:r.cleaned_transcript||r.ai_summary })) },
        { icon:'📝', label:'メモ',    items: memos.map(m=>({                       key:`memo_${m.id}`, title:m.title||'無題', sub:'', preview:m.body })) },
        { icon:'📁', label:'ファイル', items: files.filter(f=>f.summary).map(f=>({ key:`file_${f.id}`, title:f.original_name||'無題', sub:f.filetype||'', preview:f.summary })) },
      ];
      const hasData = sections.some(s => s.items.length > 0);
      if(!hasData) {
        if(multiCat) html += `<div class="ctx-empty" style="font-size:11px;padding:6px 4px;">📂 ${catName}：データなし</div>`;
        return;
      }
      if(multiCat) {
        html += `<div style="font-size:10px;font-weight:700;color:var(--accent);padding:10px 4px 4px;border-top:1px solid var(--border);margin-top:4px;">📂 ${catName}</div>`;
      }
      sections.forEach(sec => {
        if(!sec.items.length) return;
        html += `<div class="ctx-accordion">
          <div class="ctx-acc-head" onclick="toggleAccordion(this)">
            <span class="ctx-acc-label">${sec.icon} ${sec.label}（${sec.items.length}件）</span>
            <span class="ctx-acc-arrow open">▲</span>
          </div>
          <div class="ctx-acc-body open">`;
        sec.items.forEach(item => {
          // sessionStorageから復元、なければデフォルトtrue
        const _savedCtx = sessionStorage.getItem('cove_inq_context_keys');
        if(_savedCtx) {
          try {
            const _parsed = JSON.parse(_savedCtx);
            if(contextEnabled[item.key] === undefined) contextEnabled[item.key] = _parsed[item.key] !== false;
          } catch(e) { if(contextEnabled[item.key] === undefined) contextEnabled[item.key] = true; }
        } else {
          if(contextEnabled[item.key] === undefined) contextEnabled[item.key] = true;
        }
          const on = contextEnabled[item.key] !== false;
          html += `<div class="ctx-item">
            <div style="flex:1;min-width:0;">
              <div class="ctx-item-label">${item.title}</div>
              ${item.sub ? `<div class="ctx-item-sub">${item.sub}</div>` : ''}
              <div class="ctx-item-preview" id="preview-${item.key}" style="display:none;font-size:10px;color:var(--muted);margin-top:4px;line-height:1.5;max-height:80px;overflow-y:auto;white-space:pre-wrap;">${(item.preview||'').slice(0,300)}${(item.preview||'').length>300?'…':''}</div>
              <button onclick="togglePreview('${item.key}')" style="background:none;border:none;font-size:10px;color:var(--muted);cursor:pointer;padding:2px 0;margin-top:2px;" id="preview-btn-${item.key}">▶ 内容を見る</button>
            </div>
            <button class="ctx-toggle ${on?'on':''}" id="ctx-${item.key}"
              onclick="toggleContext('${item.key}')" title="${on?'除外する':'含める'}"></button>
          </div>`;
        });
        html += `</div></div>`;
      });
    });

    if(!html) html = '<div class="ctx-empty">データがありません</div>';
    content.innerHTML = html;

  } catch(e) {
    content.innerHTML = '<div class="ctx-empty">読み込みエラー</div>';
  }
}

function toggleAccordion(headEl) {
  const body  = headEl.nextElementSibling;
  const arrow = headEl.querySelector('.ctx-acc-arrow');
  const open  = body.classList.toggle('open');
  if(arrow) arrow.classList.toggle('open', open);
}

function togglePreview(key) {
  const el  = document.getElementById(`preview-${key}`);
  const btn = document.getElementById(`preview-btn-${key}`);
  if(!el) return;
  const showing = el.style.display !== 'none';
  el.style.display = showing ? 'none' : 'block';
  if(btn) btn.textContent = showing ? '▶ 内容を見る' : '▲ 閉じる';
}

function toggleContext(key) {
  contextEnabled[key] = !contextEnabled[key];
  const btn = document.getElementById(`ctx-${key}`);
  if(btn) btn.className = `ctx-toggle ${contextEnabled[key]?'on':''}`;
  sessionStorage.setItem('cove_inq_context_keys', JSON.stringify(contextEnabled));
}

function getEnabledContextKeys() {
  return Object.entries(contextEnabled).filter(([k,v])=>v).map(([k])=>k);
}

// 相談終了：処理中でも中断して下段を表示し、履歴に保存
async function endConsult() {
  clearConsultSession(); // 手動終了 → セッション削除
  // SSE接続を中断（処理中の場合）
  if(sseAbortController) {
    sseAbortController.abort();
    sseAbortController = null;
    // サーバー側のOllama処理も中断
    navigator.sendBeacon('/api/ollama/abort', JSON.stringify({}));
    // 相談するボタンを戻す
    const btn = document.getElementById('consultBtn');
    if(btn) btn.disabled = false;
  }

  if(elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; }
  document.getElementById('rpgPanel').classList.remove('visible');
  document.getElementById('bottomArea').style.display = '';
  updateContextPanelHeight();
  updateAdoptedAnswersList();

  // 全ペルソナ回答済みかチェック
  const allDone = rpgActiveList.length > 0 && rpgActiveList.every(n => personaStates[n] === 'done');

  // 相談内容がありまだ保存されていない場合のみ自動保存
  const question = document.getElementById('councilQuestion').value.trim();
  if(question && !currentSessionId) {
    try {
      const catId = getSelectedCategoryIds()[0];
      const data  = await (await fetch('/api/council/save', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          question,
          category_id: catId,
          final_decision: allDone ? '' : '（中断）',
          adopted: adoptedPersonas.map(a => ({ persona_name: a.name, answer: a.answer })),
        }),
      })).json();
      if(data.status === 'ok') {
        currentSessionId = data.session_id;
        if(!allDone) showToast('相談を中断し、履歴に保存しました');
        loadHistory();
      }
    } catch(e) {}
  }

  setTimeout(() => {
    document.getElementById('bottomArea').scrollIntoView({ behavior:'smooth', block:'start' });
  }, 100);
}

function typeText(el, text, onDone) {
  if(typingTimer) { clearInterval(typingTimer); typingTimer = null; }
  el.textContent = '';
  const cursor = document.createElement('span');
  cursor.className = 'typing-cursor';
  el.appendChild(cursor);
  let i = 0;
  typingTimer = setInterval(() => {
    if(i >= text.length) {
      clearInterval(typingTimer); typingTimer = null;
      cursor.remove();
      el.textContent = text;
      if(onDone) onDone();
      return;
    }
    el.insertBefore(document.createTextNode(text[i]), cursor);
    i++;
    el.parentElement.scrollTop = el.parentElement.scrollHeight;
  }, 16);
}

// ══════════════════════════════════════════════════
//  相談開始
// ══════════════════════════════════════════════════
function startConsult() {
  const question = document.getElementById('councilQuestion').value.trim();
  if(!question) { showToast('相談内容を入力してください', true); return; }

  const categoryId = parseInt(document.getElementById('councilCategory').value) || 1;
  rpgActiveList = PERSONA_DEFS.filter(p => personaPresent[p.name] !== false).map(p => p.name);
  if(!rpgActiveList.length) { showToast('入室中のペルソナがいません', true); return; }

  // 🧪 動作検証フラグのチェック
  if(sessionStorage.getItem('cove_debug_ollama_disconnect')) {
    sessionStorage.setItem('cove_council_question', question);
    sessionStorage.setItem('cove_council_category_id', String(categoryId));
    showErrorModal('[WinError 10054] 既存の接続はリモート ホストに強制的に切断されました。');
    return;
  }
  if(sessionStorage.getItem('cove_debug_memory_error')) {
    showErrorModal('out of memory: CUDA out of memory');
    return;
  }
  if(sessionStorage.getItem('cove_debug_model_not_found')) {
    showErrorModal('model "gemma3:27b" not found');
    return;
  }

  // 相談内容をセッションに保存（Ollama切断時の復元用）
  sessionStorage.setItem('cove_council_question',   question);
  sessionStorage.setItem('cove_council_category_id', String(categoryId));

  PERSONA_DEFS.forEach(p => { personaStates[p.name]='wait'; personaAnswers[p.name]=''; });
  Object.keys(shownAnswers).forEach(k => delete shownAnswers[k]);
  Object.keys(personaStartTimes).forEach(k => delete personaStartTimes[k]);
  Object.keys(personaElapsed).forEach(k => delete personaElapsed[k]);
  if(elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; }
  adoptedPersonas = [];
  currentSessionId = null;
  document.getElementById('decisionText').value = '';
  updateAdoptedList();
  rpgIndex = 0;

  // 入室中のペルソナは全員いっせいに「考え中」にする
  rpgActiveList.forEach(name => { personaStates[name] = 'think'; });

  openRpgPanel();
  renderPersonaStage();
  rpgShowCurrent();

  // 経過時間を1秒ごとに更新
  elapsedTimer = setInterval(updateElapsedDisplay, 1000);

  const btn = document.getElementById('consultBtn');
  btn.disabled = true;

  const enabledKeys = getEnabledContextKeys();

  // AbortController でSSEをキャンセル可能にする
  sseAbortController = new AbortController();

  fetch('/api/council/ask', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ question, category_id: categoryId, personas: rpgActiveList, context_keys: enabledKeys }),
    signal: sseAbortController.signal,
  }).then(res => {
    const reader = res.body.getReader(), dec = new TextDecoder();
    let buf = '';
    function pump() {
      reader.read().then(({ done, value }) => {
        if(done) { btn.disabled = false; sseAbortController = null; return; }
        buf += dec.decode(value, { stream: true });
        const parts = buf.split('\n\n');
        buf = parts.pop();
        parts.forEach(part => {
          const line = part.trim();
          if(!line.startsWith('data:')) return;
          try { handleSSE(JSON.parse(line.slice(5).trim())); } catch(e) {}
        });
        pump();
      }).catch(err => {
        // AbortErrorは正常中断なので無視
        if(err.name !== 'AbortError') {
          btn.disabled = false;
          showToast('通信エラーが発生しました', true);
        }
      });
    }
    pump();
  }).catch(err => {
    if(err.name !== 'AbortError') {
      btn.disabled = false;
      showToast('通信エラーが発生しました', true);
    }
  });
}

function handleSSE(obj) {
  switch(obj.type) {
    case 'start':
      personaStates[obj.persona] = 'think';
      startElapsedTimer(obj.persona);
      renderPersonaStage();
      if(rpgActiveList[rpgIndex] === obj.persona) rpgShowCurrent();
      break;
    case 'chunk':
      personaAnswers[obj.persona] = (personaAnswers[obj.persona]||'') + obj.chunk;
      if(rpgActiveList[rpgIndex] === obj.persona) {
        // ストリーミング中：リアルタイムにテキストを流す
        const textEl = document.getElementById('rpgAnswerText');
        if(typingTimer) { clearInterval(typingTimer); typingTimer = null; }
        textEl.textContent = personaAnswers[obj.persona];
        textEl.dataset.persona = obj.persona;
        document.getElementById('rpgThinking').style.display = 'none';
        document.getElementById('rpgFace').className = 'rpg-char-face thinking-face';
        textEl.parentElement.scrollTop = textEl.parentElement.scrollHeight;
      }
      break;
    case 'done':
      stopElapsedTimer(obj.persona);
      personaStates[obj.persona] = 'done';
      personaAnswers[obj.persona] = obj.answer;
      shownAnswers[obj.persona] = obj.answer; // ストリーミング済みなので表示完了扱い
      renderPersonaStage();
      if(rpgActiveList[rpgIndex] === obj.persona) rpgShowCurrent();
      updateElapsedDisplay();
      break;
    case 'finished':
      if(elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; }
      document.getElementById('consultBtn').disabled = false;
      showToast('全員の回答が完了しました');
      clearConsultSession(); // 正常完了 → セッション削除
      break;
    case 'error':
      document.getElementById('consultBtn').disabled = false;
      // SSE中断
      if(sseAbortController) { sseAbortController.abort(); sseAbortController = null; }
      if(elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; }
      // RPGパネルを閉じる（bottomAreaは表示しない）
      document.getElementById('rpgPanel').classList.remove('visible');
      updateContextPanelHeight();
      // エラーモーダルを表示
      showErrorModal(obj.message);
      break;
  }
}

// ── エラーモーダル ──
function showErrorModal(rawMsg) {
  const m = (rawMsg || '').toLowerCase();

  const isOllama  = m.includes('connect') || m.includes('10054') ||
                    m.includes('10061')   || m.includes('強制的に切断') ||
                    m.includes('既存の接続');
  const isMemory  = m.includes('out of memory') || m.includes('cuda out');
  const isDisk    = m.includes('disk') || m.includes('storage') || m.includes('no space') ||
                    m.includes('ディスク');

  let icon, title, body, btnLabel, btnAction;

  if(isOllama) {
    icon      = '🔌';
    title     = 'AI処理中に切断されました';
    body      = '相談中にAI（ペルソナ）との接続が切れました。<br>「相談をやり直す」を押すと、<br>自動的に相談が再開されます。';
    btnLabel  = '相談をやり直す';
    btnAction = 'restart';
  } else if(isMemory) {
    icon      = '💾';
    title     = 'メモリが不足しています';
    body      = '他のアプリを閉じてメモリを確保してください。<br><br>'
              + '【対処方法】<br>'
              + '① ブラウザや他のアプリを閉じる<br>'
              + '② COVEを終了する<br>'
              + '③ PC整理後にCOVEを再起動する';
    btnLabel  = 'COVEを終了する';
    btnAction = 'shutdown';
  } else if(isDisk) {
    icon      = '💿';
    title     = 'ディスクの空き容量が不足しています';
    body      = '不要なファイルを削除してディスクを整理してください。<br><br>'
              + '【対処方法】<br>'
              + '① 不要なファイル・録音データを削除する<br>'
              + '② ごみ箱を空にする<br>'
              + '③ COVEを終了する<br>'
              + '④ 整理後にCOVEを再起動する';
    btnLabel  = 'COVEを終了する';
    btnAction = 'shutdown';
  } else if(m.includes('model') && m.includes('not found')) {
    icon      = '🤖';
    title     = 'AIモデルが見つかりません';
    body      = 'AIモデルがインストールされていません。<br>設定画面でモデルをダウンロードしてください。';
    btnLabel  = '設定へ';
    btnAction = 'settings';
  } else {
    icon      = '⚠️';
    title     = 'エラーが発生しました';
    body      = humanizeError(rawMsg).replace(/\n/g, '<br>');
    btnLabel  = '閉じる';
    btnAction = 'close';
  }

  document.getElementById('errorModalIcon').textContent  = icon;
  document.getElementById('errorModalTitle').textContent = title;
  document.getElementById('errorModalMsg').innerHTML     = body;
  document.getElementById('errorModalBtn').textContent   = btnLabel;
  document.getElementById('errorModalBtn').dataset.action = btnAction;
  document.getElementById('errorModal').style.display    = 'flex';
}

async function closeErrorModal() {
  const action = document.getElementById('errorModalBtn').dataset.action || 'close';
  document.getElementById('errorModal').style.display = 'none';

  if(action === 'shutdown') {
    // COVEを終了
    await fetch('/api/shutdown', { method: 'POST' }).catch(()=>{});
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Arial;color:#888;font-size:18px;">COVEを終了しました。このタブを閉じてください。</div>';
    return;
  }

  if(action === 'settings') {
    window.location.href = '/settings';
    return;
  }

  if(action === 'restart') {
    // 相談内容をセッションから復元して再開
    const saved    = sessionStorage.getItem('cove_council_question');
    const savedCat = sessionStorage.getItem('cove_council_category_id');
    if(saved) {
      document.getElementById('councilQuestion').value = saved;
      if(savedCat) {
        const sel = document.getElementById('councilCategory');
        if(sel) sel.value = savedCat;
      }
      sessionStorage.removeItem('cove_council_question');
      sessionStorage.removeItem('cove_council_category_id');
      startConsult();
    }
  }
  // 'close' は何もしない（モーダルを閉じるだけ）
}

// ── エラーメッセージを人間が理解できる言葉に変換 ──
function humanizeError(msg) {
  if(!msg) return '不明なエラーが発生しました。ページを再読み込みしてください。';
  const m = msg.toLowerCase();

  // 接続切れ（Windows・Mac・Linux 各エラー文字列に対応）
  if(m.includes('connection refused') || m.includes('11434') ||
     m.includes('winerror 10054') || m.includes('winerror 10061') ||
     m.includes('forcibly closed') || m.includes('強制的に切断') ||
     m.includes('既存の接続') || m.includes('connect'))
    return 'AIとの接続が切れました。もう一度「相談する」ボタンを押してください。（相談内容は保持されています）';
  if(m.includes('timeout') || m.includes('timed out'))
    return 'AI処理がタイムアウトしました。モデルが重すぎる可能性があります。再度お試しください。';
  if(m.includes('out of memory') || m.includes('cuda out'))
    return 'メモリ不足です。他のアプリを閉じてから再試行してください。';
  if(m.includes('model') && m.includes('not found'))
    return 'AIモデルが見つかりません。設定画面でモデルを確認してください。';
  if(m.includes('disk') || m.includes('storage') || m.includes('no space'))
    return 'ディスクの空き容量が不足しています。不要なファイルを削除してください。';
  if(m.includes('network') || m.includes('socket'))
    return 'ネットワークエラーが発生しました。接続状況を確認して再試行してください。';

  return `エラーが発生しました：${msg}`;
}

async function saveSession() {
  const question = document.getElementById('councilQuestion').value.trim();
  const catId    = parseInt(document.getElementById('councilCategory').value) || 1;
  const decision = document.getElementById('decisionText').value.trim();
  if(!question) { showToast('相談内容がありません', true); return; }
  // adoptedPersonas は {name, answer} 形式 → APIは {persona_name, answer} を期待
  const adoptedForApi = adoptedPersonas.map(a => ({ persona_name: a.name, answer: a.answer }));
  try {
    let data;
    if(currentSessionId) {
      data = await (await fetch(`/api/council/sessions/${currentSessionId}`, {
        method:'PUT', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ final_decision: decision, adopted: adoptedForApi }),
      })).json();
    } else {
      data = await (await fetch('/api/council/save', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ question, category_id:catId, final_decision:decision, adopted:adoptedForApi }),
      })).json();

      currentSessionId = data.session_id || currentSessionId;
      showToast('保存しました ✓');
      loadHistory();
    } else {
      showToast('保存に失敗しました', true);
    }
  } catch(e) { showToast('通信エラー', true); }
}

async function rateAdopted(adoptedId, rating, starsEl) {
  // 同じ評価をクリックしたら0にリセット
  const current = parseInt(starsEl.dataset.rating) || 0;
  const newRating = current === rating ? 0 : rating;
  try {
    await fetch(`/api/council/adopted/${adoptedId}/rating`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ rating: newRating }),
    });
    starsEl.dataset.rating = newRating;
    starsEl.querySelectorAll('.star').forEach((s, i) => {
      s.classList.toggle('on', i < newRating);
    });
    showToast(newRating > 0 ? `★${newRating} 評価を保存しました` : '評価をリセットしました');
  } catch(e) {
    showToast('評価の保存に失敗しました', true);
  }
}

function buildCatDropdown(cats) {
  const dropdown = document.getElementById('multiCatDropdown');
  if(!dropdown) return;
  // sessionStorageに保存値がない場合のみデフォルト適用
  const hasSaved = !!sessionStorage.getItem('cove_inq_categories');
  if(!hasSaved) {
    cats.forEach(c => {
      if(c.name === '利用者情報' && !selectedCategoryIds.includes(c.id)) {
        selectedCategoryIds = [c.id, ...selectedCategoryIds.filter(id => id !== 1)];
      }
    });
    if(selectedCategoryIds.length === 0 && cats.length > 0) {
      selectedCategoryIds = [cats[0].id];
    }
  }
  dropdown.innerHTML = cats.map(c => `
    <label class="multi-cat-item">
      <input type="checkbox" value="${c.id}" onchange="onCatChange()"
        ${selectedCategoryIds.includes(c.id) ? 'checked' : ''}>
      <span class="multi-cat-dot" style="background:${c.color||'#6B7280'};"></span>
      <span title="${c.name}" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;max-width:180px;">${c.name}</span>
    </label>`).join('');
  updateCatLabel();
}

function toggleCatDropdown() {
  const dd = document.getElementById('multiCatDropdown');
  if(!dd) return;
  dd.classList.toggle('open');
  if(dd.classList.contains('open')) {
    setTimeout(() => {
      document.addEventListener('click', closeCatDropdown, { once: true });
    }, 0);
  }
}

function closeCatDropdown(e) {
  const wrap = document.getElementById('multiCatWrap');
  if(wrap && !wrap.contains(e.target)) {
    document.getElementById('multiCatDropdown')?.classList.remove('open');
  } else {
    setTimeout(() => {
      document.addEventListener('click', closeCatDropdown, { once: true });
    }, 0);
  }
}

function onCatChange() {
  const checks = document.querySelectorAll('#multiCatDropdown input[type=checkbox]:checked');
  selectedCategoryIds = [...checks].map(c => parseInt(c.value));
  if(!selectedCategoryIds.length) {
    const first = document.querySelector('#multiCatDropdown input[type=checkbox]');
    if(first) { first.checked = true; selectedCategoryIds = [parseInt(first.value)]; }
  }
  updateCatLabel();
  loadContextData();
  sessionStorage.setItem('cove_inq_categories', JSON.stringify(selectedCategoryIds));
}

function updateCatLabel() {
  const label = document.getElementById('multiCatLabel');
  if(!label) return;
  const checks = document.querySelectorAll('#multiCatDropdown input[type=checkbox]:checked');
  const names  = [...checks].map(c => c.closest('.multi-cat-item').querySelector('span:last-child').textContent);
  if(!names.length) { label.textContent = 'カテゴリを選択'; return; }
  label.textContent = names.length === 1 ? names[0] : `${names[0]} 他${names.length-1}件`;

  questionEl.value = '';
  document.getElementById('consultBtn').disabled = true;
  setInquiryUiDisabled(true);

  // 会話ログに質問を追加
  appendLog('Q', question);

  // RPGパネルを開く
  rpgActiveList = ['アーカイバー'];
  rpgIndex      = 0;
  personaStates['アーカイバー']  = 'think';
  personaAnswers['アーカイバー'] = '';
  openRpgPanel();
  rpgShowCurrent();

  // 既存SSEを中断
  if(inquirySseController) inquirySseController.abort();
  inquirySseController = new AbortController();

  try {
    const res = await fetch('/api/inquiry/ask', {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify({
        question,
        category_id:  catId,
        context_keys: contextKeys,
        history:      [...conversationHistory], // 現在までの会話履歴（QとA）を渡す
      }),
      signal: inquirySseController.signal,
    });

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let   buf     = '';

    while(true) {
      const { done, value } = await reader.read();
      if(done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for(const line of lines) {
        if(!line.startsWith('data: ')) continue;
        try {
          const obj = JSON.parse(line.slice(6));
          if(obj.type === 'chunk') {
            personaAnswers['アーカイバー'] = (personaAnswers['アーカイバー'] || '') + obj.chunk;
            const thinkEl = document.getElementById('rpgThinking');
            const textEl  = document.getElementById('rpgAnswerText');
            if(thinkEl) thinkEl.style.display = 'none';
            if(textEl) {
              textEl.textContent = personaAnswers['アーカイバー'];
              textEl.parentElement.scrollTop = textEl.parentElement.scrollHeight;
            }
          } else if(obj.type === 'done') {
            const answer = obj.answer || personaAnswers['アーカイバー'];
            personaStates['アーカイバー'] = 'done';
            rpgShowCurrent();
            // 履歴に回答を追加
            conversationHistory.push({ role: 'assistant', content: answer });
            // ログに回答追加（フィードバックボタン付き）
            appendLog('A', answer, question);
            document.getElementById('consultBtn').disabled = false;
            setInquiryUiDisabled(false);
          } else if(obj.type === 'error') {
            personaStates['アーカイバー'] = 'wait';
            rpgShowCurrent();
            showErrorModal(obj.message);
            document.getElementById('consultBtn').disabled = false;
            setInquiryUiDisabled(false);
          }
        } catch(e) {}
      }
    }
  } catch(e) {
    if(e.name !== 'AbortError') {
      showErrorModal(e.message || '');
      document.getElementById('consultBtn').disabled = false;
      setInquiryUiDisabled(false);
    }
  }
}

// ── 照会中の非アクティブ化・アクティブ化 ────────
function setInquiryUiDisabled(disabled) {
  ['consultBtn', 'councilQuestion'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = disabled;
  });
  // カテゴリドロップダウンボタン
  document.querySelectorAll('.multi-cat-btn').forEach(btn => btn.disabled = disabled);
  // コンテキストチェックボックス
  document.querySelectorAll('#ctxContent input[type="checkbox"]').forEach(cb => cb.disabled = disabled);
}

// 会話ログに追記
function appendLog(type, text, question) {
  const logSection = document.getElementById('conversationLog');
  const logList    = document.getElementById('logList');
  if(!logSection || !logList) return;

  logSection.style.display = 'block';

  const isQ   = type === 'Q';
  const color = isQ ? '#7C6AF7' : '#1D9E75';
  const label = isQ ? '🔍 照会' : '🗂 アーカイバー';

  const entry = document.createElement('div');
  entry.style.cssText = 'margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border);';

  const feedbackHtml = !isQ ? `
    <div style="display:flex;gap:8px;margin-top:10px;">
      <button onclick="sendFeedback(this,'good','${encodeURIComponent(question||'')}','${encodeURIComponent(text)}')"
        style="padding:3px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;
               color:var(--muted);cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s;"
        onmouseover="this.style.borderColor='#1D9E75';this.style.color='#1D9E75';"
        onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)';">
        👍 正しい
      </button>
      <button onclick="sendFeedback(this,'bad','${encodeURIComponent(question||'')}','${encodeURIComponent(text)}')"
        style="padding:3px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;
               color:var(--muted);cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s;"
        onmouseover="this.style.borderColor='#E24B4A';this.style.color='#E24B4A';"
        onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)';">
        👎 違う
      </button>
    </div>` : '';

  entry.innerHTML = `
    <div style="font-size:10px;font-weight:600;color:${color};margin-bottom:6px;">${label}</div>
    <div style="font-size:13px;color:var(--text);line-height:1.8;white-space:pre-wrap;max-height:400px;overflow-y:auto;">${text}</div>
    ${feedbackHtml}`;

  logList.appendChild(entry);
  logSection.scrollTop = logSection.scrollHeight;
}

// フィードバック送信
async function sendFeedback(btn, feedback, encodedQ, encodedA) {
  const question = decodeURIComponent(encodedQ);
  const answer   = decodeURIComponent(encodedA);
  try {
    await fetch('/api/inquiry/feedback', {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify({ question, answer, feedback }),
    });
    // ボタンを押したら選択状態にする
    const container = btn.parentElement;
    container.querySelectorAll('button').forEach(b => {
      b.style.opacity = '0.4';
      b.disabled = true;
    });
    btn.style.opacity   = '1';
    btn.style.fontWeight = '700';
    btn.style.borderColor = feedback === 'good' ? '#1D9E75' : '#E24B4A';
    btn.style.color       = feedback === 'good' ? '#1D9E75' : '#E24B4A';
    showToast(feedback === 'good' ? '👍 フィードバックを送信しました' : '👎 フィードバックを送信しました');
  } catch(e) {
    showToast('フィードバックの送信に失敗しました', true);
  }
}
